services:
  mysql:
    build: 
      context: .
      dockerfile: Dockerfile.mysql
    container_name: mysql_container
    restart: always
    ports:
      - "3305:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  
  phpmyadmin:
    build:
      context: .
      dockerfile: Dockerfile.phpmyadmin
    container_name: phpmyadmin_container
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql

volumes:
  mysql_data: