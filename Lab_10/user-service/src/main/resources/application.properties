# ===============================
# APP CONFIGURATION
# ===============================
spring.application.name=user-service
server.port=8080

# ===============================
# DATABASE CONFIGURATION
# ===============================
# Note: 'localhost' is used here for running locally via IDE. 
# When running via Docker, docker-compose.yml will override this URL.
spring.datasource.url=jdbc:mysql://localhost:3305/userdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Show and format SQL in console for easier debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true